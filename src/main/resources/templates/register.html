<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản Mới - Lani Coffee</title>
    <!-- Remix Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f3ede6 0%, #e2d4c9 100%);
            padding: 24px;
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 40px 32px;
            border-radius: var(--radius-md);
            animation: slide-in 0.8s ease;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="glass-card login-card">
            <div style="text-align: center; margin-bottom: 28px;">
                <a href="/" style="font-size: 28px; font-weight: 800; color: var(--primary); display:inline-flex; align-items:center; gap:8px;">
                    <i class="ri-coffe-bean-fill" style="color: var(--secondary);"></i> Lani Coffee
                </a>
                <p style="font-size:14px; color:rgba(78,46,30,0.6); margin-top:8px;">Đăng ký tài khoản khách hàng hoàn toàn miễn phí.</p>
            </div>

            <form id="register-form" onsubmit="handleRegisterSubmit(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Tên tài khoản (đăng nhập)</label>
                    <div style="position:relative;">
                        <input type="text" id="username" class="form-input" placeholder="Ví dụ: nguyenavana" style="padding-left:42px;" required>
                        <i class="ri-user-line" style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(78,46,30,0.4);"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Địa chỉ Email</label>
                    <div style="position:relative;">
                        <input type="email" id="email" class="form-input" placeholder="Ví dụ: nguyenavana@gmail.com" style="padding-left:42px;" required>
                        <i class="ri-mail-line" style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(78,46,30,0.4);"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Số điện thoại liên hệ</label>
                    <div style="position:relative;">
                        <input type="tel" id="phone" class="form-input" placeholder="Ví dụ: 0987654321" pattern="[0-9]{10}" title="Số điện thoại phải gồm 10 số!" style="padding-left:42px;" required>
                        <i class="ri-phone-line" style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(78,46,30,0.4);"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Mật khẩu bảo mật (tối thiểu 6 ký tự)</label>
                    <div style="position:relative;">
                        <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu dài >= 6 ký tự" style="padding-left:42px;" minlength="6" required>
                        <i class="ri-lock-line" style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(78,46,30,0.4);"></i>
                    </div>
                </div>

                <button type="submit" class="buy-now-btn" style="width:100%; height:48px; font-size:15px; margin-top:28px;">
                    Tạo tài khoản mới
                </button>
            </form>

            <div style="text-align:center; margin-top:24px; font-size:14px; color:rgba(78,46,30,0.65);">
                Đã có tài khoản? <a href="/login" style="color:var(--secondary); font-weight:700; hover:text-decoration:underline;">Đăng nhập tại đây</a>
            </div>
            <a href="/" style="display:block; text-align:center; margin-top:16px; font-size:13px; font-weight:600; color:var(--primary-light);">
                <i class="ri-arrow-left-line"></i> Trở về trang chủ
            </a>
        </div>
    </div>

    <!-- JS Scripts -->
    <script src="/js/app.js"></script>
    <script>
        function handleRegisterSubmit(e) {
            e.preventDefault();

            const usernameVal = document.getElementById('username').value;
            const emailVal = document.getElementById('email').value;
            const phoneVal = document.getElementById('phone').value;
            const passwordVal = document.getElementById('password').value;

            const payload = {
                username: usernameVal,
                email: emailVal,
                phone: phoneVal,
                password: passwordVal
            };

            fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.ok) {
                    showToast('Đăng ký tài khoản thành công! Đang chuyển đến trang đăng nhập...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    return res.text().then(txt => { throw new Error(txt); });
                }
            })
            .catch(err => {
                showToast('Lỗi đăng ký: ' + err.message, 'error');
            });
        }
    </script>
</body>
</html>
