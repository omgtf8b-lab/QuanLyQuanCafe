<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Tài Khoản - Lani Coffee</title>
    <!-- Remix Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f3ede6 0%, #e2d4c9 100%);
            padding: 24px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px 32px;
            border-radius: var(--radius-md);
            animation: slide-in 0.8s ease;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="glass-card login-card">
            <div style="text-align: center; margin-bottom: 32px;">
                <a href="/" style="font-size: 28px; font-weight: 800; color: var(--primary); display:inline-flex; align-items:center; gap:8px;">
                    <i class="ri-coffe-bean-fill" style="color: var(--secondary);"></i> Lani Coffee
                </a>
                <p style="font-size:14px; color:rgba(78,46,30,0.6); margin-top:8px;">Đăng nhập để trải nghiệm đặt đồ uống online nhanh chóng.</p>
            </div>

            <form id="login-form" onsubmit="handleLoginSubmit(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Tên tài khoản</label>
                    <div style="position:relative;">
                        <input type="text" id="username" class="form-input" placeholder="Nhập tên đăng nhập (Ví dụ: customer)" style="padding-left:42px;" required>
                        <i class="ri-user-line" style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(78,46,30,0.4);"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Mật khẩu bảo mật</label>
                    <div style="position:relative;">
                        <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu (Ví dụ: 123456)" style="padding-left:42px;" required>
                        <i class="ri-lock-line" style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(78,46,30,0.4);"></i>
                    </div>
                </div>

                <button type="submit" class="buy-now-btn" style="width:100%; height:48px; font-size:15px; margin-top:28px;">
                    Đăng nhập tài khoản
                </button>
            </form>

            <div style="text-align:center; margin-top:24px; font-size:14px; color:rgba(78,46,30,0.65);">
                Chưa có tài khoản Lani? <a href="/register" style="color:var(--secondary); font-weight:700; hover:text-decoration:underline;">Đăng ký ngay</a>
            </div>
            <a href="/" style="display:block; text-align:center; margin-top:16px; font-size:13px; font-weight:600; color:var(--primary-light);">
                <i class="ri-arrow-left-line"></i> Trở về trang chủ cửa hàng
            </a>
        </div>
    </div>

    <!-- JS Scripts -->
    <script src="/js/app.js"></script>
    <script>
        function handleLoginSubmit(e) {
            e.preventDefault();

            const usernameVal = document.getElementById('username').value;
            const passwordVal = document.getElementById('password').value;

            const payload = {
                username: usernameVal,
                password: passwordVal
            };

            fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.ok) {
                    return res.json();
                } else {
                    return res.text().then(txt => { throw new Error(txt); });
                }
            })
            .then(user => {
                showToast(`Chào mừng trở lại, ${user.username}!`, 'success');
                
                // Save user details
                localStorage.setItem('lani_user', JSON.stringify(user));

                // Redirect based on role
                setTimeout(() => {
                    const role = user.role.toLowerCase();
                    if (role === 'admin') {
                        window.location.href = '/admin/dashboard';
                    } else if (role === 'staff') {
                        window.location.href = '/admin/orders';
                    } else {
                        window.location.href = '/';
                    }
                }, 1000);
            })
            .catch(err => {
                showToast('Lỗi đăng nhập: ' + err.message, 'error');
            });
        }
    </script>
</body>
</html>
